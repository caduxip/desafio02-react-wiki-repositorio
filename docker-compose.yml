services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: github-repository-explorer-app
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    stdin_open: true
    tty: true
    restart: unless-stopped

volumes:
  node_modules:
